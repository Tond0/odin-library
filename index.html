<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google M3 Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Material+Symbols+Outlined"
        rel="stylesheet">


    <link rel="stylesheet" href="style.css">
    <script src="logic.js" defer></script>
    <title>Document</title>
</head>

<body>
    <div class="container horizontal bgGap">

        <!-- This will be filled of books by the js file -->
        <div id="library"></div>

        <!-- FAB Form -->
        <form action="" class="container vertical mdGap bgPad floatingForm" method="post">
            <div class="container vertical smGap">
                <input type="text" id="bookTitle" placeholder="Insert Book Name" required>
                <input type="text" id="bookAuthor" placeholder="Insert Book Author" required>
            </div>
            <div style="background-color: gray; width: 100%; height: 0.1px;"></div>
            <input type="submit" value="Add Book" name="formSubmit" class="button primary md">
        </form>
        
        <!-- Book template -->
        <template id="bookTemplate">
            <div class="book">
                <div class="container horizontal wFill hFit alignEnd">
                    <button id="buttonDelete" class="button icon outlined sm dangerous">
                        <md-icon>delete</md-icon>
                    </button>
                </div>
                <div class="container vertical wFill hFit alignCenter smGap">
                    <span class="title">Name</span>
                    <span class="author">Author</span>
                </div>
                <div class="container horizontal wFill hFit alignCenter">
                    <button id="buttonCompleted" class="button outlined outlined sm">
                        Completed
                    </button>
                </div>
            </div>
        </template>

    </div>
</body>

</html>
